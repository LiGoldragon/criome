[package]
name         = "criome"
version      = "0.1.1"
edition      = "2024"
rust-version = "1.89"
license      = "MIT OR Apache-2.0"
repository   = "https://github.com/LiGoldragon/criome"
description  = "Spartan BLS-signature authentication and attestation daemon for the Persona ecosystem."

[lib]
name = "criome"
path = "src/lib.rs"

[[bin]]
name = "criome"
path = "src/main.rs"
required-features = ["nota-text"]

[[bin]]
name = "criome-daemon"
path = "src/bin/criome-daemon.rs"

[features]
default = []
nota-text = ["dep:nota-next", "signal-criome/nota-text", "signal-frame/nota-text"]

[dependencies]
blake3       = "1"
blst         = "0.3"
kameo        = { version = "0.20", default-features = false, features = ["macros", "tracing"] }
nota-next    = { git = "https://github.com/LiGoldragon/nota-next.git", branch = "main", optional = true }
rkyv         = { version = "0.8", default-features = false, features = ["std", "bytecheck", "little_endian", "pointer_width_32", "unaligned"] }
sema-engine  = { git = "https://github.com/LiGoldragon/sema-engine.git", branch = "main" }
signal-frame = { git = "https://github.com/LiGoldragon/signal-frame.git", branch = "main" }
signal-criome = { git = "https://github.com/LiGoldragon/signal-criome.git", branch = "criome-spirit-log-object-auth" }
thiserror    = "2"
tokio        = { version = "1", features = ["rt-multi-thread", "macros", "io-util", "net"] }
triad-runtime = { git = "https://github.com/LiGoldragon/triad-runtime.git", branch = "main" }

[dev-dependencies]
tempfile = "3"

[lints.rust]
unsafe_code = "forbid"
unused      = { level = "warn", priority = -1 }
dead_code   = "warn"
